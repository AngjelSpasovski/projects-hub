<section class="calculator-page surface-panel">
  <app-page-header
    eyebrowKey="PROJECTS.CALCULATOR.TITLE"
    titleKey="CALCULATOR.TITLE"
    descriptionKey="CALCULATOR.DESCRIPTION"
    [featureKeys]="['CALCULATOR.FEATURES.ARITHMETIC', 'CALCULATOR.FEATURES.KEYBOARD', 'CALCULATOR.FEATURES.ERRORS']"
  />

  <div class="calculator" [attr.aria-label]="'CALCULATOR.TITLE' | translate">
    <div class="display">
      <div class="expression">{{ expression || 'CALCULATOR.READY' | translate }}</div>
      <output>{{ displayValue }}</output>
    </div>

    <div class="keypad">
      @for (button of buttons; track button.value) {
        <button
          type="button"
          class="calculator-key"
          [class]="button.className"
          (click)="handleButton(button)"
        >
          {{ button.label }}
        </button>
      }
    </div>
  </div>
</section>
