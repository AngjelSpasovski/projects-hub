<section class="calculator-page">
  <div class="calculator" [attr.aria-label]="'CALCULATOR.TITLE' | translate">
    <div class="display">
      <div class="expression">{{ expression || 'CALCULATOR.READY' | translate }}</div>
      <output>{{ displayValue }}</output>
    </div>

    <div class="keypad">
      @for (button of buttons; track button.value) {
        <button
          type="button"
          class="calculator-key"
          [class]="button.className"
          [style.grid-area]="button.gridArea"
          (click)="handleButton(button)"
        >
          {{ button.label }}
        </button>
      }
    </div>
  </div>
</section>
